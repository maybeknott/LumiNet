# cbindgen configuration for generating C headers from lumicore
# Run: cbindgen --config cbindgen.toml --crate lumicore --output lumicore.h

language = "C"
header = "/* Generated by cbindgen - DO NOT EDIT */"
include_guard = "LUMICORE_H"
autogen_warning = "/* Warning: this file is autogenously generated by cbindgen. Don't modify this manually. */"
tab_width = 4
style = "Both"

[defines]

[export]
include = []
exclude = []
prefix = "Lumi"

[export.rename]

[enum]
rename_variants = "ScreamingSnakeCase"

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[parse]
parse_deps = false
