name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  ci:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Lint Rust Core
        run: |
          cd core
          cargo fmt -- --check
          cargo clippy -- -D warnings

      - name: Test Rust Core
        run: |
          cd core
          cargo test

      - name: Build Rust Core and Generate Header
        run: |
          make build-rust
          make generate-header

      - name: Build Web Frontend
        run: |
          make build-web

      - name: Lint Go Server
        run: |
          cd server
          go vet ./...

      - name: Test Go Server (CGO)
        run: |
          cd server
          CGO_ENABLED=1 go test ./... -v -count=1

      - name: Test Go Server (Mock / Non-CGO)
        run: |
          cd server
          CGO_ENABLED=0 go test ./... -v -count=1

      - name: Full Binary Build Check
        run: |
          make build

  windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust Core
        shell: bash
        run: cargo build --release --manifest-path core/Cargo.toml

      # The privileged Windows code paths (system DNS/proxy/NCSI/startup) are
      # guarded by //go:build windows and are never compiled on Linux. This job
      # exists to compile and test exactly those paths, including the DNS
      # argument-injection validation.
      - name: Vet Go Server (Windows, CGO)
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          cd server
          go vet ./...

      - name: Test Go Server (Windows, CGO)
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          cd server
          go test ./... -count=1

  security:
    name: Dependency & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Govulncheck (Go)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd server
          govulncheck ./...

      - name: Cargo audit (Rust)
        run: |
          cargo install cargo-audit --locked
          cd core
          cargo audit

      - name: pnpm audit (Web)
        run: |
          npm install -g pnpm
          cd web
          pnpm install --frozen-lockfile || pnpm install
          pnpm audit --audit-level high || true
